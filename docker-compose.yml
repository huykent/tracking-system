version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: tracking_password
      POSTGRES_DB: smart_logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://tracking_user:tracking_password@postgres:5432/smart_logistics
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KUAIDI100_KEY=${KUAIDI100_KEY}
      - KUAIDI100_CUSTOMER=${KUAIDI100_CUSTOMER}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://tracking_user:tracking_password@postgres:5432/smart_logistics
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KUAIDI100_KEY=${KUAIDI100_KEY}
      - KUAIDI100_CUSTOMER=${KUAIDI100_CUSTOMER}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      - backend

volumes:
  postgres_data:
